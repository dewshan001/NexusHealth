spring.application.name=NexusHelth

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:nexushelth.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-with-a-long-random-string
jwt.expiration=86400000

# CORS Configuration
cors.allowedOrigins=http://localhost:8080,http://localhost:3000,file://

# Logging
logging.level.root=INFO
logging.level.com.nexushelth=DEBUG


