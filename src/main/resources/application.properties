spring.application.name=Clinic

# =============================================
# SQLite Database Configuration
# =============================================
# Database is stored in the project folder (./clinic.db)
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.url=jdbc:sqlite:C:/Users/Dewshan Gunawardhane/Desktop/New project/Clinic/clinic.db
spring.datasource.username=
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# =============================================
# Thymeleaf Configuration
# =============================================
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

# =============================================
# SQL Script Initialization
# =============================================
spring.sql.init.mode=always
spring.sql.init.resource-locations=classpath:schema.sql
spring.sql.init.continue-on-error=false

# =============================================
# Session Configuration
# =============================================
# Session timeout: 30 minutes of inactivity
server.servlet.session.timeout=30m

# Cookie Security Settings
# http-only: Prevents JavaScript from accessing session cookies (XSS protection)
# same-site=lax: CSRF protection while allowing normal navigation
# secure=false: For development; set to true in production with HTTPS
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.path=/
server.servlet.session.cookie.secure=false
server.servlet.session.tracking-modes=cookie

# Session Storage: Currently using in-memory storage
# This means sessions are lost on server restart
# For production: Consider using spring-session-jdbc with persistent database storage
# To enable persistence: Add spring-session-jdbc dependency and set store-type=jdbc
spring.session.store-type=none

# =============================================
# Form and Upload Limits
# =============================================
server.tomcat.max-http-form-post-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =============================================
# Appointment Configuration
# =============================================
appointment.fee=500

